# .github/workflows/ci.yml
# Security: No Gitee credentials on GitHub side. Jenkins handles all Gitee interactions.
name: Gitee CI/CT

on:
  repository_dispatch:
    types: [gitee-pr-ci]

permissions: {}

jobs:
  # ============================================================
  # Job 1: Parse payload (no secrets, no user code)
  # ============================================================
  parse:
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.p.outputs.org }}
      repo: ${{ steps.p.outputs.repo }}
      pr_id: ${{ steps.p.outputs.pr_id }}
      pr_branch: ${{ steps.p.outputs.pr_branch }}
      manifest_url: ${{ steps.p.outputs.manifest_url }}
      repo_http_url: ${{ steps.p.outputs.repo_http_url }}
      all_pr: ${{ steps.p.outputs.all_pr }}
    steps:
      - name: Parse and validate payload
        id: p
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          ORG=$(echo "$CLIENT_PAYLOAD" | jq -r '.org // empty')
          REPO=$(echo "$CLIENT_PAYLOAD" | jq -r '.repo // empty')
          PR_ID=$(echo "$CLIENT_PAYLOAD" | jq -r '.pr_id // empty')
          PR_BRANCH=$(echo "$CLIENT_PAYLOAD" | jq -r '.pr_branch // empty')

          for field in org repo pr_id pr_branch; do
            val=$(echo "$CLIENT_PAYLOAD" | jq -r ".$field // empty")
            if [ -z "$val" ]; then
              echo "::error::Missing required field: $field"
              exit 1
            fi
          done

          echo "org=$ORG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "pr_id=$PR_ID" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "manifest_url=$(echo "$CLIENT_PAYLOAD" | jq -r '.manifest_url // empty')" >> $GITHUB_OUTPUT
          echo "repo_http_url=$(echo "$CLIENT_PAYLOAD" | jq -r '.repo_http_url // empty')" >> $GITHUB_OUTPUT

          # Parse PR description for depends-on
          echo "$CLIENT_PAYLOAD" | jq -r '.pr_description // empty' > /tmp/pr_desc.txt
          CURRENT_PR="https://gitee.com/$ORG/$REPO/pulls/$PR_ID"
          DEPENDS=$(grep -oP 'depends-on:\s*\[[^]]+\]' /tmp/pr_desc.txt 2>/dev/null | grep -oP '(?<=\[)[^]]+(?=\])' || true)
          PR_LIST="$CURRENT_PR $DEPENDS"
          PR_LIST=$(echo $PR_LIST | awk '{for(i=1;i<=NF;i++) if(!a[$i]++) printf "%s%s",$i,(i==NF?ORS:OFS)}')

          ALL_PR=""
          for url in $PR_LIST; do
            if echo "$url" | grep -qP '^https://gitee\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+/pulls/[0-9]+$'; then
              pair=$(echo "$url" | sed -n 's#https://gitee.com/\([^/]\+/[^/]\+\)/pulls/\([0-9]\+\)#\1:\2#p')
              [ -n "$pair" ] && ALL_PR="$ALL_PR $pair"
            fi
          done
          manifest_part=$(echo "$ALL_PR" | grep -o 'open-vela/manifests[^ ]*' || true)
          if [ -n "$manifest_part" ]; then
            rest=$(echo "$ALL_PR" | sed "s|$manifest_part||" | xargs)
            ALL_PR="$manifest_part $rest"
          fi
          ALL_PR=$(echo $ALL_PR | xargs)
          echo "all_pr=$ALL_PR" >> $GITHUB_OUTPUT
          echo "Parsed ALL_PR: $ALL_PR"

  # ============================================================
  # Job 2: CI/CT execution (NO SECRETS at all)
  # ============================================================
  ci-ct:
    needs: parse
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      ORG_NAME: ${{ needs.parse.outputs.org }}
      REPO_NAME: ${{ needs.parse.outputs.repo }}
      PR_ID: ${{ needs.parse.outputs.pr_id }}
      PR_BRANCH: ${{ needs.parse.outputs.pr_branch }}
      MANIFEST_URL: ${{ needs.parse.outputs.manifest_url }}
      REPO_HTTP_URL: ${{ needs.parse.outputs.repo_http_url }}
      ALL_PR: ${{ needs.parse.outputs.all_pr }}
    outputs:
      result: ${{ steps.ci.outputs.result }}
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          sudo curl -s -o /usr/local/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: Run CI/CT (no secrets in environment)
        id: ci
        env:
          PR_DEPENDS_ON: ${{ needs.parse.outputs.all_pr }}
        run: |
          chmod +x gitee_ci.sh
          export PR_DESCRIPTION_FILE=/dev/null
          export BUILD_URL=""
          export GITEE_API_TOKEN=""
          export SKIP_GITEE_NOTIFY=true

          ./gitee_ci.sh 2>&1 | tee /tmp/ci_output.log
          CI_EXIT=${PIPESTATUS[0]}

          if [ $CI_EXIT -eq 0 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
          exit $CI_EXIT
