# .github/workflows/ci.yml
# Security: No Gitee credentials on GitHub side.
name: Gitee CI/CT

on:
  repository_dispatch:
    types: [gitee-pr-ci]

permissions: {}

jobs:
  # ============================================================
  # Job 1: Parse payload + fetch matrix
  # ============================================================
  parse:
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.p.outputs.org }}
      repo: ${{ steps.p.outputs.repo }}
      pr_id: ${{ steps.p.outputs.pr_id }}
      pr_branch: ${{ steps.p.outputs.pr_branch }}
      manifest_url: ${{ steps.p.outputs.manifest_url }}
      repo_http_url: ${{ steps.p.outputs.repo_http_url }}
      all_pr: ${{ steps.p.outputs.all_pr }}
      matrix: ${{ steps.p.outputs.matrix }}
    steps:
      - name: Parse and validate payload
        id: p
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          ORG=$(echo "$CLIENT_PAYLOAD" | jq -r '.org // empty')
          REPO=$(echo "$CLIENT_PAYLOAD" | jq -r '.repo // empty')
          PR_ID=$(echo "$CLIENT_PAYLOAD" | jq -r '.pr_id // empty')
          PR_BRANCH=$(echo "$CLIENT_PAYLOAD" | jq -r '.pr_branch // empty')

          for field in org repo pr_id pr_branch; do
            val=$(echo "$CLIENT_PAYLOAD" | jq -r ".$field // empty")
            if [ -z "$val" ]; then
              echo "::error::Missing required field: $field"
              exit 1
            fi
          done

          echo "org=$ORG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "pr_id=$PR_ID" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "manifest_url=$(echo "$CLIENT_PAYLOAD" | jq -r '.manifest_url // empty')" >> $GITHUB_OUTPUT
          echo "repo_http_url=$(echo "$CLIENT_PAYLOAD" | jq -r '.repo_http_url // empty')" >> $GITHUB_OUTPUT

          # Parse depends-on
          echo "$CLIENT_PAYLOAD" | jq -r '.pr_description // empty' > /tmp/pr_desc.txt
          CURRENT_PR="https://gitee.com/$ORG/$REPO/pulls/$PR_ID"
          DEPENDS=$(grep -oP 'depends-on:\s*\[[^]]+\]' /tmp/pr_desc.txt 2>/dev/null | grep -oP '(?<=\[)[^]]+(?=\])' || true)
          PR_LIST="$CURRENT_PR $DEPENDS"
          PR_LIST=$(echo $PR_LIST | awk '{for(i=1;i<=NF;i++) if(!a[$i]++) printf "%s%s",$i,(i==NF?ORS:OFS)}')

          ALL_PR=""
          for url in $PR_LIST; do
            if echo "$url" | grep -qP '^https://gitee\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+/pulls/[0-9]+$'; then
              pair=$(echo "$url" | sed -n 's#https://gitee.com/\([^/]\+/[^/]\+\)/pulls/\([0-9]\+\)#\1:\2#p')
              [ -n "$pair" ] && ALL_PR="$ALL_PR $pair"
            fi
          done
          manifest_part=$(echo "$ALL_PR" | grep -o 'open-vela/manifests[^ ]*' || true)
          if [ -n "$manifest_part" ]; then
            rest=$(echo "$ALL_PR" | sed "s|$manifest_part||" | xargs)
            ALL_PR="$manifest_part $rest"
          fi
          ALL_PR=$(echo $ALL_PR | xargs)
          echo "all_pr=$ALL_PR" >> $GITHUB_OUTPUT

          # Fetch build matrix from public-actions
          if [ "$PR_BRANCH" = "dev" ]; then
            CI_URL="https://raw.githubusercontent.com/open-vela/public-actions/dev/.github/workflows/ci-real.yml"
          else
            CI_URL="https://raw.githubusercontent.com/open-vela/public-actions/trunk/.github/workflows/ci.yml"
          fi
          echo "Fetching matrix from: $CI_URL" >&2
          CI_YAML=$(curl -s "$CI_URL")
          MATRIX=$(echo "$CI_YAML" | python3 -c "
          import sys, re, json
          content = sys.stdin.read()
          groups = []
          current_group = None
          current_tasks = []
          in_tasks = False
          for line in content.split('\n'):
              s = line.strip()
              if '- group:' in s:
                  if current_group and current_tasks:
                      groups.append({'group': current_group, 'tasks': current_tasks})
                  current_group = s.split('- group:')[1].strip().split('#')[0].strip()
                  current_tasks = []
                  in_tasks = False
              elif 'tasks:' in s and current_group:
                  in_tasks = True
                  m = re.search(r'tasks:\s*\[([^\]]+)\]', s)
                  if m:
                      for t in m.group(1).split(','):
                          t = t.strip().strip('\"').strip(\"'\")
                          if t: current_tasks.append(t)
                      in_tasks = False
              elif in_tasks and s.startswith('- '):
                  t = s[2:].strip().strip('\"').strip(\"'\")
                  if t and not t.startswith('#'):
                      current_tasks.append(t)
              elif in_tasks and s and not s.startswith('#') and not s.startswith('-'):
                  in_tasks = False
          if current_group and current_tasks:
              groups.append({'group': current_group, 'tasks': current_tasks})
          print(json.dumps({'include': groups}))
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix: $MATRIX" >&2

  # ============================================================
  # Job 2: Setup - repo sync, record PR info, generate snapshot
  #         (NO cherry-pick here - done in each ci-tasks group)
  # ============================================================
  setup:
    needs: parse
    runs-on: ubuntu-latest
    outputs:
      snapshot: ${{ steps.snapshot.outputs.name }}
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          sudo curl -s -o /usr/local/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          df -h

      - name: Repo Init and Sync
        env:
          PR_BRANCH: ${{ needs.parse.outputs.pr_branch }}
          MANIFEST_URL: ${{ needs.parse.outputs.manifest_url }}
        run: |
          repo init -u "$MANIFEST_URL" -b "${PR_BRANCH:-trunk}" -m openvela.xml --group=default,platform-linux --depth=1 --git-lfs
          repo sync -c -d --no-tags --force-sync -j$(nproc)

      - name: Generate snapshot and PR info
        id: snapshot
        env:
          ALL_PR: ${{ needs.parse.outputs.all_pr }}
          ORG: ${{ needs.parse.outputs.org }}
          REPO: ${{ needs.parse.outputs.repo }}
          PR_ID: ${{ needs.parse.outputs.pr_id }}
        run: |
          SNAPSHOT_NAME="snapshot_${ORG}_${REPO}_${PR_ID}"
          PR_INFO_FILE="pr_info_${ORG}_${REPO}_${PR_ID}"

          # Generate snapshot (frozen manifest with exact commit SHAs)
          repo manifest -r -o "$SNAPSHOT_NAME"

          # Record PR commit info for each dependency
          # Format: repo_name:commit_sha (one per line)
          for PR_INFO in $ALL_PR; do
            REPO_FULL_PATH=$(echo "$PR_INFO" | cut -d ':' -f 1 | xargs)
            PR_NUMBER=$(echo "$PR_INFO" | cut -d ':' -f 2)
            PROJECT_NAME=$(echo "$REPO_FULL_PATH" | cut -d '/' -f 2)

            if [ "$PR_NUMBER" = "0" ] || [ "$REPO_FULL_PATH" = "none/none" ] || [ -z "$PR_NUMBER" ]; then
              continue
            fi

            if [ "$PROJECT_NAME" = "manifests" ]; then
              cd .repo/manifests
              git fetch origin "pull/$PR_NUMBER/head:pr-branch"
              LATEST_SHA=$(git rev-parse pr-branch)
              cd -
            else
              REPO_PATH=$(grep "\"$PROJECT_NAME\"" .repo/manifests/openvela.xml | awk -F'"' '{print $2}')
              if [ -z "$REPO_PATH" ]; then
                echo "WARNING: Could not find path for $PROJECT_NAME"
                continue
              fi
              cd "$REPO_PATH"
              git fetch "https://gitee.com/$REPO_FULL_PATH.git" "pull/$PR_NUMBER/head:pr-branch"
              LATEST_SHA=$(git rev-parse pr-branch)
              cd -
            fi
            echo "${REPO_FULL_PATH}:${PR_NUMBER}:${LATEST_SHA}" >> "$PR_INFO_FILE"
            echo "Recorded: ${REPO_FULL_PATH} PR#${PR_NUMBER} SHA=${LATEST_SHA}"
          done

          # Create empty PR_INFO_FILE if no PRs
          touch "$PR_INFO_FILE"

          echo "name=$SNAPSHOT_NAME" >> $GITHUB_OUTPUT
          echo "pr_info=$PR_INFO_FILE" >> $GITHUB_OUTPUT

      - name: Upload snapshot and PR info
        uses: actions/upload-artifact@v4
        with:
          name: source_info
          path: |
            ${{ steps.snapshot.outputs.name }}
            pr_info_*

  # ============================================================
  # Job 3: CI tasks - parallel by group, cherry-pick + Docker build
  # ============================================================
  ci-tasks:
    needs: [parse, setup]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.parse.outputs.matrix) }}
      fail-fast: false
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - name: Download snapshot and PR info
        uses: actions/download-artifact@v4
        with:
          name: source_info

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install repo
        run: |
          mkdir ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Repo Init and Sync from snapshot
        env:
          PR_BRANCH: ${{ needs.parse.outputs.pr_branch }}
          MANIFEST_URL: ${{ needs.parse.outputs.manifest_url }}
          SNAPSHOT_FILE: ${{ needs.setup.outputs.snapshot }}
        run: |
          # Save snapshot and pr_info before repo init overwrites workspace
          cp "$SNAPSHOT_FILE" /tmp/ 2>/dev/null || true
          cp pr_info_* /tmp/ 2>/dev/null || true

          repo init -u "$MANIFEST_URL" -b "${PR_BRANCH:-trunk}" -m openvela.xml --group=default,platform-linux --depth=1 --git-lfs

          # Copy snapshot into manifests and re-init with it
          cp "/tmp/$SNAPSHOT_FILE" .repo/manifests/
          echo "Re-init with snapshot: $SNAPSHOT_FILE"
          repo init -m "$SNAPSHOT_FILE" --group=default,platform-linux --depth=1 --git-lfs
          repo sync -c -d --no-tags --force-sync -j$(nproc)

          # Restore pr_info for cherry-pick step
          cp /tmp/pr_info_* . 2>/dev/null || true
          df -h

      - name: Cherry-pick PRs
        env:
          ALL_PR: ${{ needs.parse.outputs.all_pr }}
          SNAPSHOT_FILE: ${{ needs.setup.outputs.snapshot }}
        run: |
          git config --global user.email "openvela-robot@xiaomi.com"
          git config --global user.name "openvela-robot"

          PR_INFO_FILE=$(ls pr_info_* 2>/dev/null | head -1)
          if [ -z "$PR_INFO_FILE" ] || [ ! -s "$PR_INFO_FILE" ]; then
            echo "No PRs to cherry-pick"
            exit 0
          fi

          for PR_INFO in $ALL_PR; do
            REPO_FULL_PATH=$(echo "$PR_INFO" | cut -d ':' -f 1 | xargs)
            PR_NUMBER=$(echo "$PR_INFO" | cut -d ':' -f 2)
            PROJECT_NAME=$(echo "$REPO_FULL_PATH" | cut -d '/' -f 2)

            if [ "$PR_NUMBER" = "0" ] || [ "$REPO_FULL_PATH" = "none/none" ] || [ -z "$PR_NUMBER" ]; then
              continue
            fi

            # Get commit SHA from PR info file
            PR_COMMIT=$(grep "^${REPO_FULL_PATH}:" "$PR_INFO_FILE" | awk -F':' '{print $3}')
            if [ -z "$PR_COMMIT" ]; then
              echo "WARNING: No commit info for $REPO_FULL_PATH, skipping"
              continue
            fi

            if [ "$PROJECT_NAME" = "manifests" ]; then
              cd .repo/manifests
              git fetch origin "pull/$PR_NUMBER/head:pr-branch"
              git cherry-pick $(git rev-list --reverse HEAD..$PR_COMMIT)
              cd -
              repo sync -c -d --no-tags --force-sync -j$(nproc)
            else
              REPO_NAME=$(grep "\"$PROJECT_NAME\"" ".repo/manifests/$SNAPSHOT_FILE" | awk -F'name="' '{print $2}' | awk -F'"' '{print $1}')
              REPO_PATH=$(grep "\"$PROJECT_NAME\"" ".repo/manifests/$SNAPSHOT_FILE" | awk -F'path="' '{print $2}' | awk -F'"' '{print $1}')
              [ -z "$REPO_PATH" ] && REPO_PATH="$REPO_NAME"
              if [ -z "$REPO_PATH" ]; then
                echo "WARNING: Could not find path for $PROJECT_NAME"
                continue
              fi
              cd "$REPO_PATH"
              git fetch openvela "pull/$PR_NUMBER/head:pr-branch"
              git cherry-pick $(git rev-list --reverse HEAD..$PR_COMMIT)
              cd -
            fi
          done

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker Pull
        run: docker pull ghcr.io/open-vela/openvela-ci-linux_from_apache-nuttx

      - name: Clean up after Docker pull
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker builder prune -a 2>/dev/null || true
          df -h

      - name: Run CI tasks in Docker
        env:
          CI_MATRIX_GROUP: ${{ matrix.group }}
        run: |
          WORKSPACE=$(pwd)
          for task in ${{ join(matrix.tasks, ' ') }}; do
            echo "=== Building: $task ==="
            cmake_flag=""
            cp_base_dir="nuttx"
            if [[ "$task" == *@* ]]; then
              cmake_flag="--cmake"
              task_name=$(echo "$task" | awk -F '@' '{print $1}')
              cp_base_dir="cmake_out/*"
            else
              task_name="$task"
            fi

            if [[ "$task_name" == *:* ]] || [[ "$task_name" == *vendor/* ]] || [[ "$task_name" == ./* ]]; then
              build_cmd="./build.sh $task_name $cmake_flag -e -Werror -j$(nproc)"
            else
              build_cmd="./build.sh vendor/openvela/boards/vela/configs/$task_name $cmake_flag -e -Werror -j$(nproc)"
            fi

            echo "Build command: $build_cmd"
            docker run --rm \
              -v "${WORKSPACE}":/workspace \
              -w /workspace \
              ghcr.io/open-vela/openvela-ci-linux_from_apache-nuttx:latest \
              /bin/bash -c "df -h && $build_cmd && ls -atl nuttx"

            echo "=== Cleaning up after $task ==="
            sudo ~/bin/repo forall -c 'git clean -dfx; git reset --hard HEAD' > /dev/null 2>&1 || true
            sudo rm -rf cmake_out || true
          done

      - name: Check status
        id: check
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT
